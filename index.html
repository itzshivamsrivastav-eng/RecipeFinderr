<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>

        

        *{
            box-sizing: border-box;
        }

        body{
            background-image: url('searchbarpage.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
            margin: 0;
        }

        h1{
            width: 90%;
            max-width: 760px;
            margin: 150px auto 30px;
            padding: 20px;
            text-align: center;
            font-size: 48px;
            color: red;
            border: 3px inset green;
            border-radius: 15px;
            background-color: rgba(255,255,255,0.8);
            
        }

        .searchHeading{
            margin-left: 40px;
            display: inline-block;
            border-bottom: 3px inset black;
            font-size: 28px;
            color: red;
            border-radius: 20px;
            background-color: rgba(255,255,255,0.8);
            padding: 5px 10px;
            font-family: 'Cursive', sans-serif;
        }

        .favoriteHeading{
            display: block;
            width: fit-content;
            margin-left: auto;
            margin-right: 40px;
            border-bottom: 3px inset black;
            font-size: 28px;
            color: red;
            border-radius: 20px;
            background-color: rgba(255,255,255,0.8);
            padding: 5px 10px;
            font-family: 'Cursive', sans-serif;
        }
        .searchBox{
            display: block;
            width: 90%;
            max-width: 760px;
            margin: 20px auto;
            padding: 20px;
            font-size: 24px;
            border: 3px inset green;
            border-radius: 50px;
        }

        .searchBox::placeholder{
            font-size: 24px;
        }

        .btn{
            display: block;
            margin: 20px auto;
            padding: 15px 30px;
            font-size: 20px;
            color: brown;
            background-color: rgba(255,255,255,0.5);
            border-radius: 20px;
            cursor: pointer;
        }

        .wr{
            text-align: center;
            color: #dc2626;
            border-top: 2px inset green;
            border-bottom: 2px inset green;
            border-radius: 10px;
            padding: 5px;
            margin: 20px;
            font-family: 'Poppins', sans-serif;
        }

        .ingre-heading{
            display: inline-block;
            color: black;
            border-bottom: 3px inset rgb(171,92,92);
            border-radius: 10px;
            padding: 5px 10px;
        }

        .ingre-list{
            font-size: 20px;
            color: lch(21.69% 60.6 311.15);
            font-family: 'Poppins', sans-serif;
        }

        .para{
            font-size: 20px;
            padding: 10px;
            border: 3px inset rgb(171,92,92);
            border-radius: 10px;
            color: #0f766e;
            font-family: 'Poppins', sans-serif;
        }
        .favorite-item{
            margin-right: 40px;
            margin-left: 80%;
            padding-left: 10px;
            border-left: 2px outset black;
            border-right: 2px outset black;
            cursor: pointer;
            color: rgb(55, 57, 131);
            background-color: rgb(223, 186, 218);
            
        }
        .favorite-item:last-child{
            padding-bottom: 10px;
            border-bottom: 2px outset black;
            
        }

        .favorite-item:first-of-type{
            border-top: 2px outset black;
            padding-top: 10px;
            
        }
        
        .history-item{
            margin-right: 80%;
            margin-left: 40px;
            padding-left: 10px;
            border-left: 2px outset black;
            border-right: 2px outset black;
            cursor: pointer;
            color: rgb(55, 57, 131);
            background-color: rgba(223, 234, 247, 0.797);
            
        }
        
        .history-item:last-child{
            padding-bottom: 10px;
            border-bottom: 2px outset black;
            
        }
        .history-item:first-of-type{
            border-top: 2px outset black;
            padding-top: 10px;
            
        }
        .favorite-item:hover{
            color:red;
        }
        .favorite-item:active{
            color:green;
        }

        .history-item:hover{
            color: red;
        }
        .history-item:active{
            color: green;
        }
    

        .img{
            width: 250px;
            display: block;
            margin: 20px auto;
            border: 20px solid transparent;
            border-image: url('border.png') 30 stretch;
        }

        .ytbtn{
            display: block;
            margin: 30px auto;
            padding: 10px 30px;
            font-size: 20px;
            color: red;
            background-color: rgba(255,255,255,0.5);
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
        }
        .favbtn{
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid red;
            border-radius: 20px;
            background-color: rgba(255,255,255,0.5);
            cursor: pointer;
            color: red;
            margin: 20px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .overlay{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .recipe-card{
            width: 90%;
            max-width: 700px;
            height: 80vh;
            background-image: url('background.png');
            padding: 20px;
            border-radius: 20px;
            overflow-y: auto;
        }

        .hidden{
            display: none;
        }

        .error{
            color: red;
            font-size: 20px;
            text-align: center;
        }

        .spinner{
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,0.25);
            border-top-color: orange;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }

        .section-line{
            width: 90%;
            margin: 40px auto;
            border: none;
            border-top: 3px solid black;
            border-image: url('border.png') 20 stretch;
            border-radius: 10px;
        }

        @keyframes spin{
            to{
                transform: rotate(360deg);
            }
        }

        footer{
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            color: white;
            background-color: rgba(0,0,0,0.7);
        }

        /* MOBILE */

        @media (max-width:768px){

            h1{
                width: 95%;
                margin-top: 60px;
                font-size: 28px;
                padding: 15px;
            }

            .searchBox{
                width: 95%;
                font-size: 18px;
                padding: 15px;
            }

            .searchBox::placeholder{
                font-size: 18px;
            }

            .btn{
                font-size: 16px;
                padding: 12px 20px;
            }

            .searchHeading,
            .favoriteHeading{
                display: block;
                width: fit-content;
                margin: 20px auto;
                font-size: 22px;
                text-align: center;
            }

            .history-item,
            .favorite-item{
                width: 90%;
                max-width: none;
                margin: 0 auto;
                font-size: 16px;
            }

            #clearHistory{
                width: 200px;
                margin: 20px auto !important;
                text-align: center;
            }

            .recipe-card{
                width: 95%;
                height: 90vh;
                padding: 15px;
            }

            .wr{
                margin: 10px 0;
                font-size: 18px;
                padding: 10px;
            }

            .img{
                width: 180px;
                border-width: 12px;
            }

            .ingre-list,
            .para{
                font-size: 16px;
            }

            .ytbtn,
            .favbtn{
                font-size: 16px;
                padding: 10px 15px;
            }

            footer{
                font-size: 13px;
                padding: 12px;
            }
        }
    @media (max-width:480px){

        h1{
            font-size: 24px;
        }

        .searchBox{
            font-size: 16px;
        }

        .searchHeading,
        .favoriteHeading{
            font-size: 20px;
        }

        .img{
            width: 150px;
        }

        .wr,
        .para,
        .ingre-list{
            font-size: 15px;
        }
    }
    
    </style>
</head>
<body>
    <h1>Search For Your Recipes</h1>
    <input type="text" class = "searchBox" id="searchInput" placeholder="Enter recipe name...">
    <button class = "btn" id="searchButton">Search🔎</button>
    <div id="historyBox"></div>
    <p id = "clearHistory" class = "btn" style="margin-right: 80%; margin-left: 2.5%; background-color: rgba(255,255,255,0.8)">Clear History</p>

    <hr class="section-line">
    <hr class="section-line">
    <div id="favoriteBox"></div>
    <div class="overlay hidden" id="overlay">
        <div class="recipe-card">
            <button id="closeBtn">❌</button>
            <button class = "ytbtn" id="favoriteBtn">Add to Favorites ❤️</button>
            <div id="recipe-card"></div>
        </div>
    </div>
    <footer>© 2026 Recipe Founder | Made with ❤️ by Shivam Srivastava™</footer>
    <script>
        const recipeContent = document.getElementById("recipe-card");
        const searchButton = document.getElementById("searchButton");
        const searchInput = document.getElementById("searchInput");
        const overlay = document.getElementById("overlay");
        const closeBtn = document.getElementById("closeBtn");
        const historyBox = document.getElementById("historyBox");
        const clearHistory = document.getElementById("clearHistory");
        const favoriteBtn = document.getElementById("favoriteBtn");

        closeBtn.addEventListener("click", () => {
                overlay.classList.add("hidden");
        });

        favoriteBtn.addEventListener("click", () => {
            const recipeName = searchInput.value.trim();
            if (recipeName !== "") {
                saveFavorite(recipeName);
                showFavorite();
            }
        });

        function showRecipe(recipe) {
            let ingredients = "";

            for(let i = 1; i <= 20; i++){
                if(recipe[`strIngredient${i}`]){
                    ingredients += `<li>${recipe[`strIngredient${i}`]}</li>`;
                }
            }
            
            recipeContent.innerHTML = `
                
                <h2 class= "wr">Dish Name : ${recipe.strMeal}</h2>
                <img src="${recipe.strMealThumb}" class ="img">
                <h2 class = "wr">Category : ${recipe.strCategory}</h2>
                <h2 class = "wr">Country : ${recipe.strArea}</h2>
                <a href="${recipe.strYoutube}" target="_blank">
                    <button class="ytbtn">Watch Recipe Video 🎥</button></a>
                <h2 class = "ingre-heading">
                Ingredients : </h2><ul class="ingre-list">${ingredients}</ul>
                <p class="para">Instructions : ${recipe.strInstructions}</p>
            `;
            
            // overlay.classList.remove("hidden");
        }

        function loadingSpinner() {

            overlay.classList.remove("hidden");

            recipeContent.innerHTML = 
            `<div class="spinner"></div>
            <p>Loading your favourite dish</p>
            `;
        }

        function showError(message) {
            overlay.classList.remove("hidden");

            recipeContent.innerHTML = `<p class="error">${message}</p>`;
        }

        async function fetchRecipe(recipeName) {
            const url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${recipeName}`;

            const response  = await fetch(url);

            if (!response.ok) throw new Error('Request failed');

            const data = await response.json();

            if (!data.meals || data.meals.length === 0) {
                throw new Error(`Couldn't find a recipe named "${recipeName}". Please try another name.`);
            }
            return data.meals[0];
        }

        function saveHistory(recipeName) {
            let history = JSON.parse(localStorage.getItem("history")) || [];
            history.push(recipeName);

            if(!history.includes(recipeName)){
                history.unshift(recipeName);
            }

            localStorage.setItem("history", JSON.stringify(history));
        }

        async function handleSearch(recipeName) {
            loadingSpinner();
            searchButton.disabled = true;
            try {
                saveHistory(recipeName);
                showHistory();

                const recipe = await fetchRecipe(recipeName);
                showRecipe(recipe);
            } catch (err) {
                showError(err.message || 'Something went wrong. Please try again.');
            } finally {
                searchButton.disabled = false;
            }
        }
        function saveFavorite(recipename) {
            let favorite = JSON.parse(localStorage.getItem("favorite")) || [];
            favorite.push(recipename);

            localStorage.setItem("favorite", JSON.stringify(favorite));
        }

        function showFavorite() {
            let favorite = JSON.parse(localStorage.getItem("favorite")) || [];

            const favoriteBox = document.getElementById("favoriteBox");
            favoriteBox.innerHTML = "<h2 class=\"favoriteHeading\">Favorite Recipes :</h2>";

            for(let item of favorite){
                favoriteBox.innerHTML += `<li class="favorite-item">${item}</li>`;
            }

            const items = document.querySelectorAll(".favorite-item");

            for(let i = 0; i < items.length; i++){

                items[i].addEventListener("click", function(){

                    const recipeName = items[i].innerText;

                    searchInput.value = recipeName;

                    handleSearch(recipeName);
                });
            }
        }

        function showHistory (){
            let history = JSON.parse(localStorage.getItem("history")) || [];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  

            historyBox.innerHTML = "<h2 class=\"searchHeading\">Recent Searches :</h2>";

            for(let item of history){
                historyBox.innerHTML += `<li class="history-item">${item}</li>`;
            }

            const items = document.querySelectorAll(".history-item");

            for(let i = 0; i < items.length; i++){

                items[i].addEventListener("click", function(){

                    const recipeName = items[i].innerText;

                    searchInput.value = recipeName;

                    handleSearch(recipeName);
                });
            }
        }

        searchButton.addEventListener("click", (e) => {
            e.preventDefault();
            const recipeName = searchInput.value.trim();
            if (recipeName === "") {
                showError("Please enter a recipe name.");
                return;
            }
            handleSearch(recipeName);
        });

        searchInput.addEventListener("keydown", function(e){
            if(e.key === "Enter"){
                searchButton.click();
            }
        });

        clearHistory.addEventListener("click", function(){
            localStorage.removeItem("history");
            showHistory();
        });
        showHistory();
        showFavorite();


    </script>
</body>
</html>
