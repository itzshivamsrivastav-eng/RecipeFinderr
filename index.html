<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Founder</title>

    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            background-image: url('homepage.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
        }

        .container{
            width: 90%;
            max-width: 600px;

            text-align: center;
            color: red;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);

            margin: 250px auto 40px;
            padding: 20px;

            border: 10px solid transparent;
            border-image: url('border.png') 30 stretch;

            background-color: rgba(255,255,255,0.5);
        }

        .btn{
            display: block;

            width: 90%;
            max-width: 450px;

            margin: 0 auto;

            background-color: rgba(255,255,255,0.5);
            border-radius: 20px;

            padding: 15px 25px;

            color: red;
            font-size: 20px;
            cursor: pointer;
        }

        footer{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            text-align: center;
            padding: 20px;

            font-size: 18px;
            color: white;

            background-color: rgba(0,0,0,0.7);
        }

        /* Mobile */

        @media (max-width: 768px){

            .container{
                margin-top: 150px;
                font-size: 28px;
                padding: 15px;
            }

            .btn{
                width: 90%;
                font-size: 16px;
                padding: 12px 20px;
            }

            footer{
                font-size: 14px;
                padding: 12px;
            }
        }

    </style>
</head>
<body>
    <h1 class = "container">Welcome to the Recipe Founder!</h1>
    <a href = "index2.html"><button class = "btn">Proceed to explore delicious recipes!</button></a>
    <footer>
    © 2026 Recipe Founder | Made with ❤️ by Shivam Srivastava™
    </footer>

</body>
</html>
